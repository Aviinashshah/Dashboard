        const SHARD_PREFIX = 'prod_shard_';  // new prefix (old 'prod_master_shard_' treated as legacy)
        const META_FILE_SHARD = 100;     // split metaDict every 100 files to avoid one huge meta key
        const LEGACY_KEYS = ['prod_master_cache', 'prod_meta_cache']; // old monolithic keys

        const DB = {
            init: () => new Promise((resolve) => {
                try {
                    const req = indexedDB.open("CloudKitchenProductDB_Secure", 6); // v6: GZip Compression
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('files')) db.createObjectStore('files', { keyPath: 'id' });
                        if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE, { keyPath: 'id' });
                    };
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => resolve(null);
                } catch (e) { resolve(null); }
            }),
            // Helper: Compress JSON to GZip Blob
            compress: async (data) => {
                const stream = new Blob([JSON.stringify(data)]).stream()
                    .pipeThrough(new CompressionStream('gzip'));
                return await new Response(stream).blob();
            },
            // Helper: Decompress GZip Blob to JSON
            decompress: async (blob) => {
                try {
                    const stream = blob.stream().pipeThrough(new DecompressionStream('gzip'));
                    const text = await new Response(stream).text();
                    return JSON.parse(text);
                } catch (e) { console.error('[DB] Decompress Failed:', e); return null; }
            },
            saveFile: (db, file) => new Promise((resolve) => {
                if (!db) return resolve(false);
                try {
                    const tx = db.transaction(DB_STORE, 'readwrite');
                    tx.objectStore(DB_STORE).put(file);
                    tx.oncomplete = () => resolve(true);
                    tx.onerror = () => { console.warn('[DB] saveFile error:', tx.error?.message); resolve(false); };
                } catch (e) { console.warn('[DB] saveFile exception:', e.message); resolve(false); }
            }),
            deleteFile: (db, id) => new Promise((resolve) => {
                if (!db) return resolve();
                try {
                    const tx = db.transaction(DB_STORE, 'readwrite');
                    tx.objectStore(DB_STORE).delete(id);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => resolve();
                } catch (e) { resolve(); }
            }),
            getAllKeys: (db) => new Promise((resolve) => {
                if (!db) return resolve([]);
                try {
                    const tx = db.transaction(DB_STORE, 'readonly');
                    const req = tx.objectStore(DB_STORE).getAllKeys();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = () => resolve([]);
                } catch (e) { resolve([]); }
            }),
            getFile: (db, id) => new Promise((resolve) => {
                if (!db) return resolve(null);
                try {
                    const tx = db.transaction(DB_STORE, 'readonly');
                    const req = tx.objectStore(DB_STORE).get(id);
                    req.onsuccess = () => resolve(req.result || null);
                    req.onerror = () => resolve(null);
                } catch (e) { resolve(null); }
            }),
            clearAll: (db) => new Promise(resolve => {
                if (!db) return resolve();
                try {
                    const tx = db.transaction(DB_STORE, 'readwrite');
                    tx.objectStore(DB_STORE).clear();
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => resolve();
                } catch (e) { resolve(); }
            }),
            // ✅ Write a single shard by index — GZip Compressed
            writeShard: async (db, shardIndex, rows) => {
                if (!db || !rows || rows.length === 0) return false;
                const compressed = await DB.compress(rows);
                const ok = await DB.saveFile(db, { id: SHARD_PREFIX + shardIndex, data: compressed, c: true });
                if (!ok) console.warn('[SHARD] shard', shardIndex, 'failed to write (' + rows.length + ' rows)');
                return ok;
            },
            // ✅ Read and Decompress a single shard
            readShard: async (db, id) => {
                const file = await DB.getFile(db, id);
                if (!file || !file.data) return null;
                if (file.c) return await DB.decompress(file.data);
                return file.data; // fallback for uncompressed
            },
            // ✅ Read all data shards in numeric order
            readAllShards: async (db) => {
                if (!db) return [];
                const keys = await DB.getAllKeys(db);
                return keys
                    .filter(k => k.startsWith(SHARD_PREFIX))
                    .sort((a, b) => {
                        const ai = parseInt(a.slice(SHARD_PREFIX.length), 10);
                        const bi = parseInt(b.slice(SHARD_PREFIX.length), 10);
                        return ai - bi;
                    });
            },
            // ✅ Delete ALL data shards + legacy keys cleanly
            wipeAllShards: async (db) => {
                if (!db) return;
                const keys = await DB.getAllKeys(db);
                const toDelete = keys.filter(k => k.startsWith(SHARD_PREFIX) || k.startsWith('prod_master_shard_'));
                for (const k of toDelete) await DB.deleteFile(db, k);
                for (const k of LEGACY_KEYS) await DB.deleteFile(db, k);
            },
            // ✅ Write sharded meta — splits every META_FILE_SHARD entries to avoid one huge key
            writeMetaChunks: async (db, metaDict) => {
                if (!db) return;
                const fileIds = Object.keys(metaDict).filter(k => k !== '_global_meta');
                const numChunks = Math.max(1, Math.ceil(fileIds.length / META_FILE_SHARD));
                for (let ci = 0; ci < numChunks; ci++) {
                    const chunk = { _global_meta: metaDict['_global_meta'] };
                    fileIds.slice(ci * META_FILE_SHARD, (ci + 1) * META_FILE_SHARD).forEach(k => { chunk[k] = metaDict[k]; });
                    await DB.saveFile(db, { id: 'prod_meta_' + ci, data: chunk });
                }
                // Store how many meta chunks exist so boot can read them all
                await DB.saveFile(db, { id: 'prod_meta_index', data: { numChunks } });
            },
            // ✅ Read all meta chunks and merge into one dict
            readAllMeta: async (db) => {
                if (!db) return {};
                const indexObj = await DB.getFile(db, 'prod_meta_index');
                const numChunks = indexObj?.data?.numChunks || 1;
                let merged = {};
                for (let ci = 0; ci < numChunks; ci++) {
                    const chunk = await DB.getFile(db, 'prod_meta_' + ci);
                    if (chunk?.data) Object.assign(merged, chunk.data);
                }
                // Also try legacy single meta key as fallback
                if (Object.keys(merged).length === 0) {
                    const legacy = await DB.getFile(db, 'prod_meta_cache');
                    if (legacy?.data) merged = legacy.data;
                }
                return merged;
            }
        };

                if (checkAbort && checkAbort()) {
                    if (!terminated) { terminated = true; worker.terminate(); }
                    reject(new Error("Sync Aborted"));
                    return true;
                }
                return false;

            const mergeRows = (rows) => {
                for (let i = 0; i < rows.length; i++) {
                    const r = rows[i];
                    const aggKey = r.m + '|' + r.wk + '|' + r.slot + '|' + r.s + '|' + r.b + '|' + r.ci + '|' + r.p + '|' + r.v;
                    let existing = mainThreadMap.get(aggKey);
                    if (!existing) { mainThreadMap.set(aggKey, { ...r }); }
                    else { existing.ns += r.ns; existing.cs += r.cs; existing.dis += r.dis; existing.q += r.q; existing.ic += r.ic; }
                }
            };

            worker.onmessage = async (e) => {
                if (checkAndAbort()) return;
                const { type, message, payload, error } = e.data;

                if (type === 'STATUS') {
                    if (updateStatus) updateStatus(message);
                } else if (type === 'TRIGGER_GC') {
                    if (window.triggerGCPillGlobal) window.triggerGCPillGlobal();
                } else if (type === 'PARTIAL_DATA') {
                    mergeRows(payload.rows);
                    if (onPartialData) { await smartYield(); if (!checkAndAbort()) await onPartialData(payload.rows); }
                    payload.rows.length = 0; payload.rows = null;
                } else if (type === 'COMPLETE') {
                    if (!terminated) { terminated = true; worker.terminate(); }
                    if (payload.rows && payload.rows.length > 0) {
                        mergeRows(payload.rows);
                        if (onPartialData) { await smartYield(); if (!checkAndAbort()) await onPartialData(payload.rows); }
                    }
                    resolve({ rows: Array.from(mainThreadMap.values()), maxDate: payload.maxDate, minDate: payload.minDate, uniqueDates: payload.uniqueDates });
                } else if (type === 'ERROR') {
                    if (!terminated) { terminated = true; worker.terminate(); }
                    reject(new Error(error));
                }
            };
            worker.onerror = (err) => { if (!terminated) { terminated = true; worker.terminate(); } reject(err); };

        function AnimatedNumber({ value, formatter }) {
            const [displayValue, setDisplayValue] = useState(0);
            const prevValueRef = useRef(0);
            useEffect(() => {
                let start = null, reqId; const duration = 1500;
                let initial = prevValueRef.current; const target = typeof value === 'number' ? value : parseFloat(value) || 0;
                if (initial === target) { setDisplayValue(target); return; }
                const step = (timestamp) => {
                    if (!start) start = timestamp;
                    const progress = Math.min((timestamp - start) / duration, 1);
                    const current = initial + (target - initial) * (progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress));
                    setDisplayValue(current);
                    if (progress < 1) { reqId = window.requestAnimationFrame(step); }
                    else { setDisplayValue(target); prevValueRef.current = target; }
                };
                reqId = window.requestAnimationFrame(step);
                return () => window.cancelAnimationFrame(reqId);
            }, [value]);
            return <span>{formatter ? formatter(displayValue) : displayValue}</span>;

        function AIInsightsMarquee({ products }) {
            const insightsList = useMemo(() => {
                if (!products || products.length === 0) return [];
                const pool = [];
                const topSeller = products.reduce((a, b) => a.qty > b.qty ? a : b);
                if (topSeller && topSeller.name) pool.push(`🏆 <span class="text-sky-600 font-bold">Volume Leader:</span> **${topSeller.name}** is your #1 mover with ${formatNumber(topSeller.qty)} sold.`);

                const highMargin = products.filter(p => p.qty > 10).reduce((a, b) => a.margin > b.margin ? a : b, { margin: 0, name: '' });
                if (highMargin && highMargin.name) pool.push(`💰 <span class="text-teal-600 font-bold">Margin Hero:</span> **${highMargin.name}** delivers the best profitability at ${highMargin.margin.toFixed(1)}%.`);

                const totalQty = products.reduce((sum, p) => sum + p.qty, 0);
                let currentSum = 0; let topItemsCount = 0;
                const sortedByQty = [...products].sort((a, b) => b.qty - a.qty);
                for (let p of sortedByQty) { currentSum += p.qty; topItemsCount++; if (currentSum > totalQty * 0.8) break; }
                if (products.length > 0) {
                    const pctItems = ((topItemsCount / products.length) * 100).toFixed(0);
                    pool.push(`🎯 <span class="text-blue-600 font-bold">Pareto Power:</span> 80% of your sales volume comes from just **${pctItems}%** of your menu items.`);
                }

                const ghost = products.filter(p => p.qty < 5 && p.qty > 0)[0];
                if (ghost && ghost.name) pool.push(`👻 <span class="text-slate-600 font-bold">Ghost Item:</span> **${ghost.name}** is rarely ordered (${ghost.qty} sold). Consider bundling or removing.`);

                const lossLeader = products.filter(p => p.qty > 20).reduce((a, b) => a.margin < b.margin ? a : b, { margin: 100, name: '' });
                if (lossLeader && lossLeader.name) pool.push(`📉 <span class="text-rose-600 font-bold">Loss Leader:</span> **${lossLeader.name}** drives traffic but has low margin (${lossLeader.margin.toFixed(1)}%). Upsell sides!`);

                return pool.sort(() => 0.5 - Math.random()).slice(0, 4);
            }, [products]);

            if (!insightsList || insightsList.length === 0) return null;
            const safeInsights = [...insightsList, ...insightsList, ...insightsList, ...insightsList];
