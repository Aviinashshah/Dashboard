                            db.createObjectStore('files', { keyPath: 'id' });
                        }
                        if (!db.objectStoreNames.contains('product_cache')) {
                            db.createObjectStore('product_cache', { keyPath: 'id' });
                        }
                    };
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => resolve(null);
                } catch(e) { resolve(null); }
            }),
            saveFile: (db, file) => new Promise((resolve, reject) => {
                const tx = db.transaction('files', 'readwrite');
                tx.objectStore('files').put(file);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            }),
            deleteFile: (db, id) => new Promise((resolve, reject) => {
                const tx = db.transaction('files', 'readwrite');
                tx.objectStore('files').delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            }),
            getKeys: (db) => new Promise((resolve) => {
                if (!db) return resolve([]);
                const tx = db.transaction('files', 'readonly');
                const req = tx.objectStore('files').getAllKeys();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve([]);
            }),
            getFile: (db, id) => new Promise((resolve) => {
                if (!db) return resolve(null);
                const tx = db.transaction('files', 'readonly');
                const req = tx.objectStore('files').get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            }),
            clearAll: (db) => new Promise(resolve => {
                 if (!db) return resolve();
                 const tx = db.transaction('files', 'readwrite');
                 tx.objectStore('files').clear();
                 tx.oncomplete = () => resolve();

        const buildColMap = (keys) => {
            const findCol = (...candidates) => {
                const normalized = candidates.map(c => c.toUpperCase());
                for (const c of normalized) {
                    const match = keys.find(k => k.trim().toUpperCase() === c);
                    if (match) return match;
                }
                for (const c of normalized) {
                    const match = keys.find(k => k.trim().toUpperCase().includes(c));
                    if (match) return match;
                }
                return null;
            };

            return {
                id: findCol('ORDER_CRN', 'ORDER_ID', 'CRN'),
                d: findCol('EOD_DATE', 'ORDER_DATE', 'DATE'),
                createdAt: findCol('CREATED_AT'),
                st: findCol('STATUS'),
                b: findCol('BRAND_NAME', 'BRAND', 'BRAND NAME'),
                ci: findCol('CITY'),
                s: findCol('STORE_NAME', 'STORE'),
                src: findCol('ORDER_SOURCE', 'SOURCE'),
                v: findCol('VENDOR', 'VENDOR_TYPE', 'LOGISTICS', 'DELIVERY_TYPE', 'FULFILLMENT'),
                ns: findCol('NET_AMOUNT_CAL', 'NET_SALES', 'NET AMOUNT'),
                gs: findCol('GROSS_CAL', 'GROSS_SALES', 'GROSS AMOUNT'),
                cs: findCol('CART_AMOUNT_CAL', 'CART_AMOUNT'),
                dis: findCol('OWN_DISCOUNT_CAL', 'DISCOUNT'),

                ic: findCol('IFC without commission', 'IDEAL_WACC', 'IDEALS'),

        const cleanNumber = (val) => {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            return parseFloat(String(val).replace(/,/g, '')) || 0;
        };

        const processChunkAsync = async (rawRows, colMap, fileAggMap, fileSeenOrders, isMTD, isIncremental, cutoffMonth, getUnq, trackInfo) => {
            let lastYield = performance.now();
            for (let i = 0; i < rawRows.length; i++) {
                const r = rawRows[i];

                const orderId = r[colMap.id] || `UNQ-${getUnq()}`;
                const eodRaw = r[colMap.d];
                const createdAtRaw = r[colMap.createdAt];

                let eodStr = 'Unknown';
                let m = 'Unknown';
                let h = -1;

                const dateVal = eodRaw || createdAtRaw;
                if (dateVal) {
                    if (typeof dateVal === 'string') {
                        const trimmed = dateVal.trim();
                        if (trimmed.length >= 10) {
                             if (trimmed[4] === '-' && trimmed[7] === '-') {
                                 eodStr = trimmed.substring(0, 10);
                             } else {
                                 const dmyMatch = trimmed.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})/);
                                 if (dmyMatch) {
                                     eodStr = `${dmyMatch[3]}-${dmyMatch[2].padStart(2, '0')}-${dmyMatch[1].padStart(2, '0')}`;
                                 } else {
                                     const ymdMatch = trimmed.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
                                     if (ymdMatch) {
                                         eodStr = `${ymdMatch[1]}-${ymdMatch[2].padStart(2, '0')}-${ymdMatch[3].padStart(2, '0')}`;
                                     } else {
                                         const dObj = new Date(trimmed.split(' ')[0]);
                                         if (!isNaN(dObj.getTime())) eodStr = `${dObj.getFullYear()}-${String(dObj.getMonth()+1).padStart(2,'0')}-${String(dObj.getDate()).padStart(2,'0')}`;
                                     }
                                 }
                             }
                        }
                    } else if (typeof dateVal === 'number' && dateVal > 20000) {
                        const dObj = new Date(Math.round((dateVal - 25569)*86400*1000));
                        eodStr = `${dObj.getFullYear()}-${String(dObj.getMonth()+1).padStart(2,'0')}-${String(dObj.getDate()).padStart(2,'0')}`;
                    }
                }

                if (eodStr !== 'Unknown' && eodStr.length === 10) {
                    m = eodStr.substring(0, 7);
                    if (trackInfo) {
                        if (!trackInfo.maxDate || eodStr > trackInfo.maxDate) trackInfo.maxDate = eodStr;
                        if (eodStr < trackInfo.minDate) trackInfo.minDate = eodStr;
                        if (!trackInfo.uniqueDates) trackInfo.uniqueDates = new Set();
                        trackInfo.uniqueDates.add(eodStr);
                    }
                }
                
                if (isIncremental && m !== 'Unknown' && m < cutoffMonth) continue; 

                if (createdAtRaw) {
                    const timeStr = String(createdAtRaw).trim();
                    const timePart = timeStr.includes(' ') ? timeStr.split(' ')[1] : (timeStr.includes('T') ? timeStr.split('T')[1] : null);
                    if (timePart) h = parseInt(timePart.split(':')[0], 10);
                }

                const st = (r[colMap.st] || 'UNKNOWN').toString().trim().toUpperCase();
                const b = (r[colMap.b] || 'Unknown').toString().trim();
                const ci = (r[colMap.ci] || 'Unknown').toString().trim();
                const s = (r[colMap.s] || 'Unknown').toString().trim();
                const src = (r[colMap.src] || 'Unknown').toString().trim();
                const v = (r[colMap.v] || 'OWN').toString().trim().toUpperCase();

                const ns = cleanNumber(r[colMap.ns]);
                const gs = cleanNumber(r[colMap.gs]);
                const cs = cleanNumber(r[colMap.cs]);
                const dis = cleanNumber(r[colMap.dis]);
                const q = cleanNumber(r[colMap.q]);
                const ic = cleanNumber(r[colMap.ic]);
                const dc = cleanNumber(r[colMap.dc]);
                const pf = cleanNumber(r[colMap.pf]);

                const aggKey = `${eodStr}|${h}|${s}|${b}|${ci}|${src}|${st}|${v}`;

                let entry = fileAggMap.get(aggKey);
                if (!entry) {
                    entry = {
                        d: eodStr, m: m, h: h, s: s, b: b, ci: ci, src: src, st: st, v: v,
                        ns: 0, gs: 0, cs: 0, dis: 0, q: 0, ic: 0, pf: 0, dc: 0, od: 0
                    };
                    fileAggMap.set(aggKey, entry);
                }

                const packaging = pf || 0;
                entry.ns += ns + packaging;
                entry.gs += gs;
                entry.cs += cs + packaging;
                entry.dis += dis;
                entry.q += q;
                entry.ic += ic;
                entry.pf += packaging;

                const isFirstTimeOrder = !fileSeenOrders.has(orderId);
                if (isFirstTimeOrder) {
                    fileSeenOrders.add(orderId);
                    entry.od += 1;
                    entry.dc += dc; 
                } else if (isMTD) {
                    entry.dc += dc; 
                }

                if (i > 0 && i % 1000 === 0) {
                    if (performance.now() - lastYield > 10) {
                        await yieldToBrowser();
                        lastYield = performance.now();
                    }
                }
            }
        };

        const fetchWithBackoff = async (url, options, checkAbort, updateStatus) => {
            let retries = 5;
            let delay = 5000;
            while (retries > 0) {
                if (checkAbort && checkAbort()) throw new Error("Sync Aborted");
                const response = await fetch(url, options);
                if (response.status === 429 || response.status === 403) {
                    retries--;
                    for (let c = delay / 1000; c > 0; c--) {
                        if (checkAbort && checkAbort()) throw new Error("Sync Aborted");
                        if (updateStatus) updateStatus(`API LIMIT CAUGHT... BUFFERING STREAM (${c}S)`);
                        await new Promise(r => setTimeout(r, 1000));
                    }
                    delay *= 2; 
                    continue;
                }
                return response;
            }
            throw new Error("API Limit Exceeded");
        };

        const fetchAndProcessFile = (fileId, fileName, token, isIncremental, updateStatus, checkAbort) => new Promise(async (resolve, reject) => {
            if (token === 'mock-token') {
                setTimeout(async () => {
                    const mockData = generateMockSalesData();
                    const fileSeenOrders = new Set();
                    const fileAggMap = new Map();
                    let unq = 0;
                    const colMap = buildColMap(Object.keys(mockData[0]));
                    const trackInfo = { maxDate: '', minDate: '9999-99-99', uniqueDates: new Set() };
                    await processChunkAsync(mockData, colMap, fileAggMap, fileSeenOrders, false, false, "", () => unq++, trackInfo);
                    resolve({ rows: Array.from(fileAggMap.values()), maxDate: trackInfo.maxDate, minDate: trackInfo.minDate, uniqueDates: Array.from(trackInfo.uniqueDates) });
                }, 500);
                return;
            }

            const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
            const controller = new AbortController();
            const abortInterval = setInterval(() => {
                if (checkAbort && checkAbort()) {
                    controller.abort();
                    clearInterval(abortInterval);
                }
            }, 500);

            try {
                if (updateStatus) updateStatus(`Requesting ${fileName}...`);
                let response = await fetchWithBackoff(url, { headers: { 'Authorization': 'Bearer ' + token }, signal: controller.signal }, checkAbort, updateStatus);
                
                if (!response.ok && response.status !== 401 && !fileName.endsWith('.csv')) {
                    if (updateStatus) updateStatus(`Exporting Excel: ${fileName}...`);
                    response = await fetchWithBackoff(`https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=application/vnd.openxmlformats-officedocument.spreadsheetml.sheet`, { headers: { 'Authorization': 'Bearer ' + token }, signal: controller.signal }, checkAbort, updateStatus);
                }

                if (!response.ok) {
                    if (response.status === 401) throw new Error("HTTP 401 Unauthorized: Please explicitly add 'https://www.googleapis.com/auth/drive.readonly' to your appsscript.json oauthScopes and refresh.");
                    throw new Error(`HTTP ${response.status}`);
                }

                if (updateStatus) updateStatus(`Downloading Blob: ${fileName}...`);

                const isMTD = fileName.toUpperCase().includes("MTD");
                const now = new Date();
                const cutoffMonth = new Date(now.getFullYear(), now.getMonth() - 2, 1).toISOString().slice(0, 7);
                let unqCounter = 0;

                if (fileName.endsWith('.csv')) {
                    const blob = await response.blob();
                    if (updateStatus) updateStatus(`Parsing CSV: ${fileName}...`);
                    let colMap = null;
                    const fileSeenOrders = new Set();
                    const fileAggMap = new Map();
                    let totalProcessed = 0;
                    const trackInfo = { maxDate: '', minDate: '9999-99-99', uniqueDates: new Set() };

                    Papa.parse(blob, {
                        header: true,
                        skipEmptyLines: true,
                        chunkSize: 1024 * 1024 * 2, // 2MB Stream chunks
                        chunk: async function(results, parser) {
                            if (checkAbort && checkAbort()) { parser.abort(); return; }
                            parser.pause(); 
                            
                            const rawRows = results.data;
                            if (!colMap && rawRows.length > 0) colMap = buildColMap(Object.keys(rawRows[0]));

                            await processChunkAsync(rawRows, colMap, fileAggMap, fileSeenOrders, isMTD, isIncremental, cutoffMonth, () => unqCounter++, trackInfo);
                            totalProcessed += rawRows.length;
                            
                            results.data = null; // GC
                            if (updateStatus) updateStatus(`Parsed ${new Intl.NumberFormat().format(totalProcessed)} rows...`);
                            
                            // Safe to resume securely, bypasses background tab throttling
                            yieldToBrowser().then(() => parser.resume()); 
                        },
                        complete: function() { 
                            if (checkAbort && checkAbort()) { reject(new Error("Sync Aborted")); return; }
                            resolve({ rows: Array.from(fileAggMap.values()), maxDate: trackInfo.maxDate, minDate: trackInfo.minDate, uniqueDates: Array.from(trackInfo.uniqueDates) }); 
                        },
                        error: function(err) { reject(err); }
                    });
                } else {
                    const arrayBuffer = await response.arrayBuffer();
                    if (updateStatus) updateStatus(`Parsing Excel: ${fileName}...`);
                    await yieldToBrowser(); // Let UI paint before freezing thread in XLSX parser
                    const wb = XLSX.read(arrayBuffer, { type: 'array' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(ws, { defval: "" });

                    let colMap = null;
                    const fileSeenOrders = new Set();
                    const fileAggMap = new Map();
                    const chunkSize = 25000;
                    const trackInfo = { maxDate: '', minDate: '9999-99-99', uniqueDates: new Set() };

                    for (let i = 0; i < jsonData.length; i += chunkSize) {
                        if (checkAbort && checkAbort()) throw new Error("Sync Aborted");
                        const chunk = jsonData.slice(i, i + chunkSize);
                        if (!colMap && chunk.length > 0) colMap = buildColMap(Object.keys(chunk[0]));
                        await processChunkAsync(chunk, colMap, fileAggMap, fileSeenOrders, isMTD, isIncremental, cutoffMonth, () => unqCounter++, trackInfo);
                        
                        if (updateStatus) updateStatus(`Parsed ${new Intl.NumberFormat().format(i + chunk.length)} rows...`);
                    }
                    resolve({ rows: Array.from(fileAggMap.values()), maxDate: trackInfo.maxDate, minDate: trackInfo.minDate, uniqueDates: Array.from(trackInfo.uniqueDates) });
                }
            } catch (e) {
                reject(e);
            } finally {
                clearInterval(abortInterval);
            }
        });

        // --- GLOBAL PUBLISH & RESTORE METHODS ---
        
        // Frontend API call to completely bypass missing backend Apps Script functions
        const checkGlobalCacheExistsAPI = async (token, folderId, fileName) => {
            if (!token || token === 'mock-token') return { exists: false, id: null };
            try {
                // Ensure corpora=allDrives so Shared Drives are properly searched
                const q = encodeURIComponent(`name='${fileName}' and '${folderId}' in parents and trashed=false`);
                const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,modifiedTime)&supportsAllDrives=true&includeItemsFromAllDrives=true&corpora=allDrives`;
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) {
                    console.error("Drive API Search failed:", await res.text());
                    return { exists: false, id: null };
                }
                const data = await res.json();
                if (data.files && data.files.length > 0) {
                    return {
                        exists: true,
                        id: data.files[0].id,
                        updated: new Date(data.files[0].modifiedTime).getTime()
                    };
                }
            } catch(e) { 
                console.error("Global cache native check failed:", e); 
            }
            return { exists: false, id: null };
        };

        const restoreFromGlobalCache = async (token, db, globalFolderId, updateStatus) => {
            if (!globalFolderId || token === 'mock-token') return false;
            try {
                if (updateStatus) updateStatus("Checking Global Memory Snapshot...");
                
                // Use the resilient native API instead of the backend function
                const cacheInfo = await checkGlobalCacheExistsAPI(token, globalFolderId, 'hg_global_cache.json');

                if (cacheInfo && cacheInfo.exists) {
                    const localTsKey = 'hg_local_ts_hg_global_cache.json';
                    const localTs = Number(localStorage.getItem(localTsKey) || 0);
                    const currentDbKeys = await DB.getKeys(db);

                    // PRIORITIZE GLOBAL CACHE: If it's newer than our local sync, or local is empty
                    if (cacheInfo.updated > localTs || currentDbKeys.length === 0) {
                        if (updateStatus) updateStatus("Prioritizing Newer Global Cache...");
                        
                        // Wipe outdated local data to make way for the new global truth
                        await DB.clearAll(db);
                        
                        const cacheRes = await fetch(`https://www.googleapis.com/drive/v3/files/${cacheInfo.id}?alt=media&supportsAllDrives=true`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (!cacheRes.ok) return false;
                        
                        // STREAMING JSON PARSER (Memory-Safe for 6GB+ files)
                        // This reads the file chunk-by-chunk so the browser never freezes
                        const reader = cacheRes.body.getReader();
                        const decoder = new TextDecoder('utf-8');
                        let buffer = '';
                        let processedBytes = 0;
                        
                        while (true) {
                            const { done, value } = await reader.read();
                            if (value) {
                                processedBytes += value.length;
                                if (updateStatus) updateStatus(`Installing Snapshot... ${(processedBytes / 1024 / 1024).toFixed(1)} MB`);
                                
                                buffer += decoder.decode(value, { stream: true });
                                let lines = buffer.split('\n');
                                buffer = lines.pop(); // Keep the incomplete line in the buffer
                                
                                for (const line of lines) {
                                    if (line.trim() && line.trim() !== '[' && line.trim() !== ']') {
                                        // Remove trailing commas if it was saved as a standard JSON array previously
                                        let cleanLine = line.trim();
                                        if (cleanLine.endsWith(',')) cleanLine = cleanLine.slice(0, -1);
                                        if (cleanLine) {
                                            try {
                                                const fileData = JSON.parse(cleanLine);
                                                await DB.saveFile(db, fileData);
                                            } catch (err) {
                                                console.warn("Skipped malformed NDJSON line.");
                                            }
                                        }
                                    }
                                }
                                await yieldToBrowser(); // Keep UI 100% fluid and responsive
                            }
                            if (done) {
                                if (buffer.trim() && buffer.trim() !== '[' && buffer.trim() !== ']') {
                                    let cleanLine = buffer.trim();
                                    if (cleanLine.endsWith(',')) cleanLine = cleanLine.slice(0, -1);
                                    if (cleanLine) {
                                        try {
                                            const fileData = JSON.parse(cleanLine);
                                            await DB.saveFile(db, fileData);
                                        } catch (err) {
                                            console.warn("Skipped malformed NDJSON final line.");
                                        }
                                    }
                                }
                                break;
                            }
                        }
                        console.log("Global cache stream restored successfully.");
                        localStorage.setItem(localTsKey, cacheInfo.updated.toString());
                        return true;
                    } else {
                        console.log("Local cache is already up-to-date with Global Cache.");
                        return false; 
                    }
                }
            } catch (e) {
                console.error("Global cache restore failed", e);
            }
            return false;
        };

        const publishToGlobalCache = async (token, db, globalFolderId, force = false, onProgress = null) => {
            if (!globalFolderId || token === 'mock-token') return;
            
            const todayStr = new Date().toLocaleDateString();
            const lastPublish = localStorage.getItem('hg_last_publish_hg_global_cache.json');
            
            if (!force && lastPublish === todayStr) {
                console.log("Global publish already occurred today. Skipping.");
                return;
            }

            try {
                if (onProgress) onProgress("Starting Publish Engine...");
                console.log("Starting large-file global publish (Dashboard)...");
                const keys = await DB.getKeys(db);
                
                // 1. Construct Memory-Safe JSONL Blob (Newline separated, no massive array wrapper needed)
                let finalBlob = new Blob([], { type: 'application/x-ndjson' });
                
                for (let i = 0; i < keys.length; i++) {
                    const f = await DB.getFile(db, keys[i]);
                    // Add newline to separate objects, making streaming easy
                    const chunkStr = JSON.stringify(f) + '\n';
                    const chunkBlob = new Blob([chunkStr], { type: 'application/x-ndjson' });
                    
                    finalBlob = new Blob([finalBlob, chunkBlob], { type: 'application/x-ndjson' });
                    
                    if (i % 5 === 0 && onProgress) {
                        onProgress(`Assembling Data... ${Math.round((i / keys.length) * 50)}%`);
                    }
                    await yieldToBrowser(); // Let GC clean up the strings
                }

                if (onProgress) onProgress("Requesting Node Allocation... 50%");
                console.log(`Blob constructed. Size: ${(finalBlob.size / 1024 / 1024).toFixed(2)} MB`);

                // 2. Find existing file securely using the frontend Drive API natively
                const cacheInfo = await checkGlobalCacheExistsAPI(token, globalFolderId, 'hg_global_cache.json');

                // 3. Initiate Resumable Session
                const metadata = cacheInfo.exists ? {} : { name: 'hg_global_cache.json', parents: [globalFolderId], mimeType: 'application/x-ndjson' };
                const initMethod = cacheInfo.exists ? 'PATCH' : 'POST';
                const initUrl = cacheInfo.exists 
                    ? `https://www.googleapis.com/upload/drive/v3/files/${cacheInfo.id}?uploadType=resumable&supportsAllDrives=true`
                    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable&supportsAllDrives=true`;

                const initRes = await fetch(initUrl, {
                    method: initMethod,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'X-Upload-Content-Type': 'application/x-ndjson',
                        'X-Upload-Content-Length': finalBlob.size.toString()
                    },
                    body: JSON.stringify(metadata)
                });

                if (!initRes.ok) throw new Error('Failed to initiate resumable upload session');
                const uploadUri = initRes.headers.get('Location');

                if (!uploadUri) throw new Error('No resumable upload URI returned.');

                // 4. Upload the Blob with XHR for exact live progress tracking
                if (onProgress) onProgress("Transmitting... 50%");
                console.log("Uploading blob to resumable URI...");
                
                const uploadResOk = await new Promise((resolve) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('PUT', uploadUri, true);
                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable && onProgress) {
                            const percent = 50 + Math.round((e.loaded / e.total) * 50);
                            onProgress(`Uploading Snapshot... ${percent}%`);

            const [displayValue, setDisplayValue] = useState(0);
            const prevValueRef = useRef(0);
            
            useEffect(() => {
                let start = null;
                let reqId;
                const duration = 1500; 
                let initial = prevValueRef.current;
                const target = typeof value === 'number' ? value : parseFloat(value) || 0;
                
                if (initial === target) { 
                    setDisplayValue(target); 
                    return; 
                }

                const step = (timestamp) => {
                    if (!start) start = timestamp;
                    const progress = Math.min((timestamp - start) / duration, 1);
                    const easeOutExpo = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                    const current = initial + (target - initial) * easeOutExpo;
                    setDisplayValue(current);
                    
                    if (progress < 1) { reqId = window.requestAnimationFrame(step); } 
                    else { setDisplayValue(target); prevValueRef.current = target; }
                };
                reqId = window.requestAnimationFrame(step);
                return () => window.cancelAnimationFrame(reqId);
            }, [value]);

            return <span>{formatter ? formatter(displayValue) : displayValue}</span>;

            const toggleOption = (option) => {
                let newSelected;

                else {
                    const withoutDefault = selected.filter(s => s !== defaultLabel);
                    if (selected.includes(option)) newSelected = withoutDefault.filter(s => s !== option);

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [progress, setProgress] = useState(0);
            const [showExit, setShowExit] = useState(false);
            const [fileCount, setFileCount] = useState(0);
            const [totalFiles, setTotalFiles] = useState(0);
            const [processedFiles, setProcessedFiles] = useState(0);
            const [status, setStatus] = useState("Initializing System...");
            
            const aggMapRef = useRef(new Map());
            const [syncStatus, setSyncStatus] = useState("Idle");
            const currentSyncStatusRef = useRef("Idle");
            
            const loadedFileIdsRef = useRef(new Set());
            const defaultsAppliedRef = useRef(false);
            
            const abortSyncRef = useRef(false);
            const syncTimeRef = useRef(Date.now());
            const isSyncingRef = useRef(false);
            const initSyncRef = useRef();
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [refreshKey, setRefreshKey] = useState(0);
            const [showToast, setShowToast] = useState(false);

            const [maxEodDate, setMaxEodDate] = useState(() => localStorage.getItem('hg_max_date') || '');
            const [missingDates, setMissingDates] = useState(() => {
                try {
                    const saved = localStorage.getItem('hg_missing_dates');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            const [expandedTables, setExpandedTables] = useState({ perf: false, weekly: false, time: false, brand: false, brandBs: false });
            const ROW_LIMIT = 5; 

            const toggleTable = (key) => setExpandedTables(prev => ({...prev, [key]: !prev[key]}));

            const defaultFilters = { month: ['All'], country: ['All'], city: ['All'], brand: ['All'], store: ['All'], status: ['All'], eodDate: ['All'], vendorType: ['OWN'] };
            const [filters, setFilters] = useState(() => {
                return defaultFilters;
            });
            const [showFilters, setShowFilters] = useState(false);
            const [showWelcome, setShowWelcome] = useState(() => !sessionStorage.getItem('hg_intro_shown'));
            
            const [isFirstTime, setIsFirstTime] = useState(() => !localStorage.getItem('hg_has_visited'));
            const [isLongLoad, setIsLongLoad] = useState(false);

            const [folderId, setFolderId] = useState(() => localStorage.getItem('hg_folder_id') || '1hXCR8k96LMj576OgRpVSTlRFBR8GSesk');
            const [globalFolderId, setGlobalFolderId] = useState(() => localStorage.getItem('hg_global_folder_id') || '1YQ7xz-GDVCVxf_4ewtwK19paW3Er0lXM');
            
            const [incremental, setIncremental] = useState(() => { const s = localStorage.getItem('hg_incremental'); return s !== null ? s === 'true' : true; });
            const [showSettings, setShowSettings] = useState(false);

            const [breakdownType, setBreakdownType] = useState('BRAND_NAME');
            const [matrixPeriod, setMatrixPeriod] = useState('MoM');
            
            const [basketBreakdownType, setBasketBreakdownType] = useState('BRAND_NAME');
            const [basketPeriod, setBasketPeriod] = useState('MoM');

            useEffect(() => { if (showWelcome) { const timer = setTimeout(() => { setShowWelcome(false); sessionStorage.setItem('hg_intro_shown', 'true'); }, 2500); return () => clearTimeout(timer); } }, [showWelcome]);
            
            useEffect(() => { localStorage.setItem('hg_filters', JSON.stringify(filters)); }, [filters]);
            
            useEffect(() => {
                if (loading || !data || data.length === 0) return;
                
                const validMonths = new Set(data.map(r => r.m));
                validMonths.add('All');

                setFilters(prev => {
                    const currentMonths = prev.month || ['All'];
                    const cleanMonths = currentMonths.filter(m => m === 'All' || validMonths.has(m));
                    const finalMonths = cleanMonths.length > 0 ? cleanMonths : ['All'];

                    if (finalMonths.length !== currentMonths.length) {
                        return { ...prev, month: finalMonths };
                    }
                    return prev;
                });
            }, [data, loading]);

            useEffect(() => {
                if (!loading && data.length > 0 && !defaultsAppliedRef.current) {
                    const months = [...new Set(data.map(d => d.m))].filter(m => m !== 'Unknown').sort().reverse();
                    if (months.length > 0) {
                        setFilters(prev => ({
                            ...prev,
                            month: [months[0]],
                            vendorType: ['OWN'] 
                        }));
                        defaultsAppliedRef.current = true;
                    }
                }
            }, [loading, data]);

            useEffect(() => {
                currentSyncStatusRef.current = syncStatus;
            }, [syncStatus]);

            const handleManualPublish = async (onProgress) => {
                try {
                    const db = await DB.init();
                    let token = 'mock-token';
                    try { token = await gasRun('getAuthToken'); } catch(e) {}
                    await publishToGlobalCache(token, db, globalFolderId, true, onProgress);
                } catch(e) {
                    console.error("Manual publish error", e);
                }
            };

            const cpuCooldown = async (setSyncStatusFunc, currentStatusText) => {
                const now = Date.now();
                if (now - syncTimeRef.current > 5000) { 
                    if (setSyncStatusFunc) setSyncStatusFunc("BALANCING MEMORY NODES...");
                    await yieldToBrowser();
                    syncTimeRef.current = Date.now();
                    if (setSyncStatusFunc && currentStatusText) setSyncStatusFunc(currentStatusText);
                }
            };

            const networkCooldown = async (seconds, setSyncStatusFunc) => {
                const until = Date.now() + (seconds * 1000);
                while (Date.now() < until) {
                    if (abortSyncRef.current) throw new Error("Sync Aborted");
                    const remaining = Math.ceil((until - Date.now()) / 1000);
                    if (setSyncStatusFunc) setSyncStatusFunc(`Cooling Data Pipelines... Resuming in ${remaining}s`);
                    await new Promise(r => setTimeout(r, 1000));
                }
                syncTimeRef.current = Date.now();
            };

            const handleRefresh = async () => {
                if (isRefreshing) return; 
                setIsRefreshing(true);
                
                abortSyncRef.current = true;
                setSyncStatus("Aborting sequence...");
                
                await new Promise(r => setTimeout(r, 1500));
                
                aggMapRef.current.clear();
                loadedFileIdsRef.current.clear();
                setData([]);
                setLoading(true);
                setProgress(0);
                
                const crashedFile = localStorage.getItem('hg_syncing_file');
                if (crashedFile) {
                    const db = await DB.init();
                    await DB.deleteFile(db, crashedFile);
                    localStorage.removeItem('hg_syncing_file');
                }

                localStorage.removeItem('hg_max_date');
                localStorage.removeItem('hg_missing_dates');
                setMaxEodDate('');
                setMissingDates([]);
                
                setRefreshKey(prev => prev + 1); 
                
                abortSyncRef.current = false;
                setIsRefreshing(false);
                if (initSyncRef.current) initSyncRef.current(); 
            };

            const aggregateLocalRows = async (rows) => {
                const yieldThreshold = 500;
                let lastYield = performance.now();
                for (let k = 0; k < rows.length; k++) {
                    const r = rows[k];
                    const aggKey = `${r.d}|${r.h}|${r.s}|${r.b}|${r.ci}|${r.src}|${r.st}|${r.v}`; 
                    const entry = aggMapRef.current.get(aggKey);
                    if (!entry) {
                        aggMapRef.current.set(aggKey, { ...r }); 
                    } else {
                        entry.ns += r.ns; entry.gs += r.gs; entry.cs += r.cs; entry.dis += r.dis;
                        entry.q += r.q; entry.ic += r.ic; entry.pf += r.pf; entry.dc += r.dc;
                        entry.od += (typeof r.od === 'number' ? r.od : 0); 
                    }
                    if (k > 0 && k % yieldThreshold === 0 && (performance.now() - lastYield > 10)) {
                        await yieldToBrowser();
                        lastYield = performance.now();
                    }
                }
            };

            useEffect(() => {
                if (isFirstTime) {
                    localStorage.setItem('hg_has_visited', 'true');
                }
            }, [isFirstTime]);
            
            useEffect(() => { localStorage.setItem('hg_folder_id', folderId); }, [folderId]);
            useEffect(() => { localStorage.setItem('hg_global_folder_id', globalFolderId); }, [globalFolderId]);
            useEffect(() => { localStorage.setItem('hg_incremental', String(incremental)); }, [incremental]);

            const messagesList = useMemo(() => generateLoadingMessages(isFirstTime), [isFirstTime]);
            const [messageIndex, setMessageIndex] = useState(0);

            useEffect(() => { 
                if (loading && !showWelcome) {
                    const msgInterval = setInterval(() => setMessageIndex(prev => (prev + 1) % messagesList.length), 120000); 
                    const longLoadTimer = setTimeout(() => setIsLongLoad(true), 300000);

                    const progInterval = setInterval(() => {
                        setProgress(old => {
                            if (old >= 95) { 
                                clearInterval(progInterval);
                                return 95;
                            }
                            const diff = Math.random() * 5; 
                            return Math.min(old + diff, 95); 
                        });
                    }, 200);

                    return () => { clearInterval(msgInterval); clearInterval(progInterval); clearTimeout(longLoadTimer); };
                }
            }, [loading, showWelcome, messagesList]);
            
            const currentMessage = isLongLoad 
                ? { title: "Data Influx Detected", text: "Processing massive archival logs. Precision takes time." }
                : messagesList[messageIndex];

            useEffect(() => {
                initSyncRef.current = async () => {
                    if (showWelcome) return;
                    if (isSyncingRef.current) return;
                    isSyncingRef.current = true;
                    abortSyncRef.current = false;
                    let downloadedNewFiles = false;
                    let runToken = null;
                    
                    try {
                        setStatus("Warming up engines... (5s standby)");
                        await new Promise(r => setTimeout(r, 5000)); 
                        if (abortSyncRef.current) throw new Error("Sync Aborted");

                        const db = await DB.init();
                        
                        const crashedFile = localStorage.getItem('hg_syncing_file');
                        if (crashedFile) {
                            console.log("Recovering from interrupted sync / partial aggregation of:", crashedFile);
                            await DB.deleteFile(db, crashedFile);
                            localStorage.removeItem('hg_syncing_file');
                        }
                        
                        setProgress(5);
                        setStatus("Connecting to Secure Vault...");
                        let token = 'mock-token';
                        try { token = await gasRun('getAuthToken'); } catch(e) {}
                        runToken = token;
                        
                        // --- GLOBAL CACHE RESTORE (Prioritize Global over Local) ---
                        if (globalFolderId) {
                            await restoreFromGlobalCache(token, db, globalFolderId, setStatus);
                        }

                        let driveSales = [];
                        try { driveSales = await gasRun('getFilesList', folderId); }

                                            </button>
                                        </div>
                                    )}
                                </div>

                                <div className="luxury-panel p-6 lg:p-10 mb-8 animate-slide-up-fade opacity-0" style={{ animationDelay: '600ms' }}>
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-8 border-b border-white/5 pb-4 sm:pb-6 gap-4 sm:gap-0">
                                        <h3 className="text-xl font-display font-bold text-white tracking-tight flex items-center gap-2">
                                            Time Slot Performance (Sales)
                                            <TooltipBox content="Breaks down profitability across different parts of the day. A high Disc % indicates heavy reliance on promotions during that window."><InfoIcon className="text-zinc-500" /></TooltipBox>
                                        </h3>
                                        <CopyButton getText={getEfficiencyText} />
                                    </div>
                                    <div className="overflow-x-auto w-full">
                                        <table className="w-full text-sm text-left min-w-[600px]">
                                            <thead className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold border-b border-white/10">
                                                <tr>
                                                    <th className="pb-4 font-semibold whitespace-nowrap">Time Slot</th>
                                                    <th className="pb-4 text-right font-semibold whitespace-nowrap">Net Sales</th>
                                                    <th className="pb-4 text-right font-semibold whitespace-nowrap">Ideal % (Cart)</th>
                                                    <th className="pb-4 text-right font-semibold whitespace-nowrap">Disc % (Cart)</th>
                                                    <th className="pb-4 text-right text-white font-semibold whitespace-nowrap">GM % (Net)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5">
                                                {renderTimeSlotRows()}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                                    <div className="luxury-panel p-8 flex items-center justify-between gap-8 animate-slide-up-fade opacity-0" style={{ animationDelay: '650ms' }}>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex justify-between items-center mb-6">
                                                <h3 className="text-lg font-display font-bold text-white tracking-tight">Source Mix</h3>
                                                <CopyButton getText={() => getMixText(sourceMix, "Source Mix")} />
                                            </div>
                                            <div className="space-y-3">
                                                {sourceMix.slice(0, 5).map((e,i) => (
                                                    <div key={i} className="flex justify-between items-center text-sm p-2 hover:bg-white/5 rounded-lg transition-colors">
                                                        <div className="flex items-center gap-3 truncate pr-2">
                                                            <div className="w-2.5 h-2.5 rounded-full shadow-sm shrink-0" style={{backgroundColor: CHART_COLORS[i%CHART_COLORS.length]}}></div>
                                                            <span className="text-zinc-300 font-medium truncate">{e.name}</span>
                                                        </div>
                                                        <div className="flex items-center gap-4 shrink-0 text-right">
                                                            <span className="text-zinc-400 font-mono text-xs">{formatNumber(e.value)} <span className="text-[9px] uppercase tracking-widest text-zinc-600">ord</span></span>
                                                            <span className="font-bold text-white w-10 text-right">{e.pct.toFixed(1)}%</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="w-32 h-32 relative flex-shrink-0 flex items-center justify-center">
                                            <div className="absolute flex flex-col items-center justify-center pointer-events-none z-10">
                                                <span className="text-lg font-display font-bold text-white leading-none tracking-tight">{formatNumber(sourceMix.reduce((a, b) => a + b.value, 0))}</span>
                                                <span className="text-[8px] text-zinc-500 uppercase tracking-[0.2em] mt-1 font-bold">Orders</span>
                                            </div>
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Tooltip contentStyle={{backgroundColor:'rgba(5,5,5,0.95)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'8px', color: '#fff', fontSize: '12px', fontFamily: 'Outfit'}} itemStyle={{color: '#fff', fontWeight: 'bold'}} />
                                                    <Pie data={sourceMix} cx="50%" cy="50%" innerRadius={45} outerRadius={60} paddingAngle={3} dataKey="value" stroke="none" isAnimationActive={true} animationDuration={1500} animationEasing="ease-out" cornerRadius={4}>{sourceMix.map((e,i)=><Cell key={i} fill={CHART_COLORS[i%CHART_COLORS.length]} />)}</Pie>
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                    
                                    <div className="luxury-panel p-8 flex items-center justify-between gap-8 animate-slide-up-fade opacity-0" style={{ animationDelay: '700ms' }}>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex justify-between items-center mb-6">
                                                <h3 className="text-lg font-display font-bold text-white tracking-tight">Brand Mix</h3>
                                                <CopyButton getText={() => getMixText(brandMix, "Brand Mix")} />
                                            </div>
                                            <div className="space-y-3">
                                                {brandMix.slice(0, 5).map((e,i) => (
                                                    <div key={i} className="flex justify-between items-center text-sm p-2 hover:bg-white/5 rounded-lg transition-colors">
                                                        <div className="flex items-center gap-3 truncate pr-2">
                                                            <div className="w-2.5 h-2.5 rounded-full shadow-sm shrink-0" style={{backgroundColor: CHART_COLORS[i%CHART_COLORS.length]}}></div>
                                                            <span className="text-zinc-300 font-medium truncate">{e.name}</span>
                                                        </div>
                                                        <div className="flex items-center gap-4 shrink-0 text-right">
                                                            <span className="text-zinc-400 font-mono text-xs">{formatNumber(e.value)} <span className="text-[9px] uppercase tracking-widest text-zinc-600">ord</span></span>
                                                            <span className="font-bold text-white w-10 text-right">{e.pct.toFixed(1)}%</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="w-32 h-32 relative flex-shrink-0 flex items-center justify-center">
                                            <div className="absolute flex flex-col items-center justify-center pointer-events-none z-10">
                                                <span className="text-lg font-display font-bold text-white leading-none tracking-tight">{formatNumber(brandMix.reduce((a, b) => a + b.value, 0))}</span>
                                                <span className="text-[8px] text-zinc-500 uppercase tracking-[0.2em] mt-1 font-bold">Orders</span>
                                            </div>
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Tooltip contentStyle={{backgroundColor:'rgba(5,5,5,0.95)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'8px', color: '#fff', fontSize: '12px', fontFamily: 'Outfit'}} itemStyle={{color: '#fff', fontWeight: 'bold'}} />
                                                    <Pie data={brandMix} cx="50%" cy="50%" innerRadius={45} outerRadius={60} paddingAngle={3} dataKey="value" stroke="none" isAnimationActive={true} animationDuration={1500} animationEasing="ease-out" cornerRadius={4}>{brandMix.map((e,i)=><Cell key={i} fill={CHART_COLORS[i%CHART_COLORS.length]} />)}</Pie>
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <footer className="text-center pb-12 pt-8 animate-fade-in print:hidden" style={{ animationDelay: '1000ms' }}>
                            <div className="inline-flex items-center gap-6 text-[10px] text-zinc-600 font-bold uppercase tracking-[0.2em]">
                                <span className="w-12 h-px bg-zinc-800"></span>
                                End of Telemetry • Filters Linked Externally
                                <span className="w-12 h-px bg-zinc-800"></span>
                            </div>
                        </footer>

                        {showToast && (
                            <div className="fixed bottom-12 right-6 z-[10001] bg-obsidian-900 border border-white/10 p-4 rounded-xl shadow-2xl animate-slide-up-fade max-w-sm flex items-start gap-4">
                                <div className="text-luxury-emerald mt-1 animate-spin-slow"><RefreshCwIcon size={20} /></div>
                                <div>
                                    <h4 className="text-white font-bold text-sm tracking-wide">Work While We Sync</h4>
                                    <p className="text-zinc-400 text-xs mt-1 leading-relaxed">Live View Active. We are streaming historical data in the background. You can start analyzing current data immediately.</p>
                                </div>
                                <button onClick={() => setShowToast(false)} className="text-zinc-500 hover:text-white"><XIcon size={16}/></button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
